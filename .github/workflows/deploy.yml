name: Build and Push Deploy Images

on:
  push:
    branches: [ main, master ]
    paths:
      - 'src/**'
      - 'docker/RK3576/VLM/deploy_llm.dockerfile'
      - 'docker/RK3576/LLM/deploy_llm.dockerfile'
      - 'docker/RK3588/VLM/deploy_vlm.dockerfile'
      - 'docker/RK3588/LLM/deploy_llm.dockerfile'
      - '.github/workflows/deploy.yml'
      - 'lib/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: rk3576
            type: llm
            dockerfile: docker/RK3576/LLM/deploy_llm.dockerfile
            image_suffix: llm-rk3576
          - platform: rk3576
            type: vlm
            dockerfile: docker/RK3576/VLM/deploy_vlm.dockerfile
            image_suffix: vlm-rk3576
          - platform: rk3588
            type: llm
            dockerfile: docker/RK3588/LLM/deploy_llm.dockerfile
            image_suffix: llm-rk3588
          - platform: rk3588
            type: vlm
            dockerfile: docker/RK3588/VLM/deploy_vlm.dockerfile
            image_suffix: vlm-rk3588

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (for ARM64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: meta
        run: |
          IMAGE_NAME="yourusername/deploy-${{ matrix.image_suffix }}"
          TAGS="${IMAGE_NAME}:latest"
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/}"
            TAGS="${TAGS},${IMAGE_NAME}:${TAG_VERSION}"
          else
            SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
            TAGS="${TAGS},${IMAGE_NAME}:${SHORT_SHA}"
          fi
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}